<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name | Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      position: fixed;
      width: 100%;
      background: rgba(255,255,255,0.9);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('https://source.unsplash.com/1600x900/?portrait') center/cover no-repeat;
      color: white;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 10px;
      padding: 60px 40px;
    }

    .gallery img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .about, .contact {
      padding: 80px 40px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .about h2, .contact h2 {
      font-family: 'Playfair Display', serif;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <nav>
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>People. Stories. Moments.</h2>
</section>

<section id="work" class="gallery">
  <img src="https://source.unsplash.com/600x800/?portrait" />
  <img src="https://source.unsplash.com/601x800/?wedding" />
  <img src="https://source.unsplash.com/602x800/?fashion" />
  <img src="https://source.unsplash.com/603x800/?couple" />
</section>

<section id="about" class="about">
  <h2>About</h2>
  <p>
    I'm a photographer focused on capturing real moments, raw emotions, and timeless stories.
  </p>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  © 2026 Your Name
</footer>

</body>
</html>
